name: release

# CPU EP only → all builds run on GitHub-hosted runners (no self-hosted/GPU).
# Push a v* tag to build per-platform archives and attach them to the release.
on:
  push:
    # Tag == the ort-server version (no `v` prefix), matching the lemond backend
    # version pin, so the release download URL resolves. `v*` kept for back-compat.
    tags: ["[0-9]*", "v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for artifact names (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,   platform: windows-x64, archive: zip }
          - { os: ubuntu-latest,    platform: linux-x64,   archive: tar }
          - { os: ubuntu-24.04-arm, platform: linux-arm64, archive: tar }
          - { os: macos-latest,     platform: macos-arm64, archive: tar }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # tokenizers-cpp builds a small Rust static lib via cargo.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"  # pinned: the tokenizer stack is statically linked

      # On the native arm64 runner, the Rust onig_sys crate's cc-rs build looks
      # for a cross-prefixed "aarch64-unknown-linux-gnu-gcc"; give it exactly that
      # name as a symlink to the native gcc.
      - name: arm64 cc shim
        if: matrix.platform == 'linux-arm64'
        shell: bash
        run: |
          for t in gcc g++ ar ranlib; do
            sudo ln -sf "$(command -v $t)" "/usr/local/bin/aarch64-unknown-linux-gnu-$t"
          done

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          [ -z "$V" ] && V="${GITHUB_REF_NAME#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # Use the runner's default CMake (Windows ships 4.x for VS 2026 support).
      # Pass CMAKE_POLICY_VERSION_MINIMUM via bash (PowerShell mangles "3.5" ->
      # "3") so CMake 4.x accepts the old cmake_minimum_required in sentencepiece
      # / protobuf / etc.
      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage
        shell: bash
        run: |
          mkdir -p stage
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/Release/ort-server.exe stage/
            cp build/Release/onnxruntime.dll stage/
          else
            cp build/ort-server stage/
            # Skip directories (macOS ships a .dSYM debug-symbol dir alongside).
            for f in build/_deps/onnxruntime-src/lib/libonnxruntime.*; do
              [ -d "$f" ] || cp -P "$f" stage/
            done
          fi
          cp LICENSE THIRD_PARTY_NOTICES.md stage/
          # Verbatim third-party license texts (MIT requires shipping the
          # copyright + permission notice with binary distributions).
          mkdir -p stage/licenses
          cp third_party_licenses/* stage/licenses/
          # ORT texts come from the exact version-pinned upstream package.
          cp build/_deps/onnxruntime-src/LICENSE stage/licenses/onnxruntime-LICENSE
          cp build/_deps/onnxruntime-src/ThirdPartyNotices.txt stage/licenses/onnxruntime-ThirdPartyNotices.txt

      - name: Package
        shell: bash
        run: |
          NAME="ort-server-${{ steps.ver.outputs.version }}-${{ matrix.platform }}"
          cd stage
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../$NAME.zip" ./*
          else
            tar -czf "../$NAME.tar.gz" ./*
          fi

      # Smoke-test the PACKAGED archive, not the build tree: extract to a fresh
      # dir and classify a tiny committed fixture. This is exactly what lemond
      # downloads, so it also proves the bundled runtime library resolves.
      - name: Smoke test packaged /classify
        shell: bash
        run: |
          mkdir -p smoke
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z x -osmoke ort-server-*.zip
            BIN="smoke/ort-server.exe"
          else
            tar -xzf ort-server-*.tar.gz -C smoke
            BIN="smoke/ort-server"
          fi
          [ -f smoke/LICENSE ] || { echo "FAIL: LICENSE missing from archive"; exit 1; }
          [ -f smoke/THIRD_PARTY_NOTICES.md ] || { echo "FAIL: THIRD_PARTY_NOTICES.md missing"; exit 1; }
          for lf in onnxruntime-LICENSE onnxruntime-ThirdPartyNotices.txt $(ls third_party_licenses); do
            [ -f "smoke/licenses/$lf" ] || { echo "FAIL: licenses/$lf missing from archive"; exit 1; }
          done
          # Full contract suite: normalization, config.json inference, token
          # aggregation, truncation, top_k, validation 400s, startup rejects.
          python3 test/smoke.py "$BIN"

      - uses: actions/upload-artifact@v4
        with:
          name: ort-server-${{ matrix.platform }}
          path: ort-server-*.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
